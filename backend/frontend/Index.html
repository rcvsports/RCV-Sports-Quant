<!DOCTYPE html>
<html>
<head>
  <title>RCV Dashboard</title>
</head>
<body style="background:black;color:white;">

<h1>RCV LIVE DASHBOARD</h1>

<div id="parlays"></div>

<script>
fetch("https://YOUR-BACKEND-URL/parlays")
  .then(res => res.json())
  .then(data => {
    const div = document.getElementById("parlays");
    data.forEach(p => {
      div.innerHTML += `<p>${p.type} | EV: ${p.ev}</p>`;
    });
  });
</script>

</body>
</html>
